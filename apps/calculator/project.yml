# VueCalc Calculator Application Configuration (v5 M2)
# 
# 此文件支持独立 AOT 编译:
#   cd <REPO_ROOT>
#   swoole_compiler.exe examples/vue-calc/apps/calculator/project.yml -f
#
# sources 路径相对于本文件所在目录 (apps/calculator/)
name: calculator
version: 1.0.0
mode: bin
no-console: false
sources:
  # 应用代码
  - main.php
  - Application.php
  - ./gen
  # 框架运行时 (构建工具 compiler/ 不在此列)
  - ../../framework/ReactiveComponent.php
  - ../../framework/ChangeQueue.php
  - ../../framework/BaseRenderer.php
  # C++ 桥接层
  - ../../stub
  - ../../cpp

# v5 M2: Component registry — maps custom tags to .vue source files
# (由 SFC 编译器读取，AOT 忽略)
components:
  display-panel: ./components/DisplayPanel.vue
  num-pad: ./components/NumPad.vue
  about-dialog: ./components/AboutDialog.vue
