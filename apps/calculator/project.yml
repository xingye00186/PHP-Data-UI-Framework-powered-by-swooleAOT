# VueCalc Calculator Application Configuration (v6 M1)
# 
# 此文件支持独立 AOT 编译:
#   cd <框架根>
#   <swoole_compile*>/swoole_compiler.exe apps/calculator/project.yml -f
#
# sources 路径相对于本文件所在目录 (apps/calculator/)
name: calculator
version: 1.0.0
mode: bin
no-console: false
sources:
  # 应用代码
  - main.php
  - Application.php
  - ./gen
  # 框架运行时 (构建工具 compiler/ 不在此列)
  - ../../framework/ReactiveComponent.php
  - ../../framework/ChangeQueue.php
  - ../../framework/BaseRenderer.php
  - ../../framework/rendering/RenderContext.php
  - ../../framework/rendering/GdiRenderContext.php
  # C++ 桥接层
  - ../../stub
  - ../../cpp

# v6 M1: Component registry — maps custom tags to .vue source files
# (由 SFC 编译器读取，AOT 忽略)
components:
  display-panel: ./components/DisplayPanel.vue
  num-pad: ./components/NumPad.vue
  about-dialog: ./components/AboutDialog.vue
