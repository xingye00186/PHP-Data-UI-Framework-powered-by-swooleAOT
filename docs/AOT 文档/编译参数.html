<article><h1 class="sc-jTQDnj PWYCG">参数</h1><section class="sc-beySbM lmGTpq"><h2><a tabindex="-1" id="编译参数" class="sc-hLQRIN dbkbOC"></a>编译参数</h2><ul><li><code>-o</code> ： 执行生成的可执行文件、扩展的名称</li><li><code>-O0/1/2/3</code>：指定<code>GCC</code>优化等级</li><li><code>--debug-info</code>：编译时是否添加调试信息，默认关闭</li><li><code>-j {N}</code>：编译的并发任务数量，参考<code>make -j</code>参数</li><li><code>-m bin/ext</code>：编译为可执行文件还是扩展</li><li><code>--profile</code>：开启性能分析选项</li></ul></section></article>
